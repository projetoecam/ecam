<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECAM - Lista de Usuários</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="text-dark fw-bold">👥 Usuários do Sistema</h2>
                <p class="text-muted mb-0">Gerenciamento de operadores e coordenadores do projeto ECAM.</p>
            </div>
            <button class="btn btn-primary d-flex align-items-center gap-2">
                <i class="bi bi-person-plus-fill"></i> Novo Usuário
            </button>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th scope="col" class="ps-4" style="width: 10%">ID</th>
                                <th scope="col" style="width: 35%">Nome Completo</th>
                                <th scope="col" style="width: 30%">E-mail</th>
                                <th scope="col" style="width: 10%">Status</th>
                                <th scope="col" class="text-center" style="width: 15%">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="usuario : ${usuarios}">
                                <th scope="row" class="ps-4 fw-semibold text-secondary" th:text="${usuario.id}">0</th>
                                
                                <td>
                                    <div class="fw-bold text-dark" th:text="${usuario.nomeCompleto}">NOME DO USUARIO</div>
                                </td>
                                
                                <td class="text-muted" th:text="${usuario.email}">email@exemplo.com</td>
                                
                                <td>
                                    <span th:if="${usuario.ativo}" class="badge bg-success-subtle text-success px-2 py-1 rounded-pill">Ativo</span>
                                    <span th:unless="${usuario.ativo}" class="badge bg-danger-subtle text-danger px-2 py-1 rounded-pill">Inativo</span>
                                </td>
                                
                                <td class="text-center">
                                    <div class="d-flex justify-content-center gap-2">
                                        <button class="btn btn-sm btn-outline-secondary" title="Editar">
                                            <i class="bi bi-pencil-square"></i>
                                        </button>
                                        <button class="btn btn-sm btn-outline-danger" title="Excluir">
                                            <i class="bi bi-trash3-fill"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                            
                            <tr th:if="${#lists.isEmpty(usuarios)}">
                                <td colspan="5" class="text-center text-muted py-4">
                                    Nenhum usuário encontrado no banco de dados.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
            <div class="card-footer bg-white border-0 py-3 text-muted d-flex justify-content-between align-items-center">
                <span>Exibindo <strong th:text="${#lists.size(usuarios)}">0</strong> usuários cadastrados.</span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
